name: Release ParserGenerator (Maven)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Create Maven settings.xml (GitHub Packages)
        run: |
          cat > ${{ github.workspace }}/settings.xml <<'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Derive version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set Maven project version
        run: mvn -B versions:set -DnewVersion="${{ env.VERSION }}" -DgenerateBackupPoms=false

      - name: Build + Deploy to GitHub Packages
        run: mvn -B clean deploy --settings ${{ github.workspace }}/settings.xml

      - name: Upload JAR(s) to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/*.jar