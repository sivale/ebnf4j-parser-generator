name: Build JAR (Maven)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -B clean package

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            target/*.jar
            !target/*-sources.jar
            !target/*-javadoc.jar